<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - İK İzin Yönetimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../components/navbar.css">
    <link rel="stylesheet" href="../../components/header/header.css">
    <link rel="stylesheet" href="../../components/table/table.css">
    <link rel="stylesheet" href="../../components/badges/badges.css">
    <link rel="stylesheet" href="../../components/display-modal/display-modal.css">
    <link rel="stylesheet" href="../../components/confirmation-modal/confirmation-modal.css">
    <link rel="icon" type="image/png" href="../../images/gemkom.png">
</head>
<body>
    <div id="navbar-container"></div>

    <section class="modules-section py-5">
        <div class="container-fluid">
            <div id="header-placeholder"></div>

            <div class="row mb-3">
                <div class="col-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="row g-2 align-items-end">
                                <div class="col-12 col-md-3">
                                    <label class="form-label small mb-1">Kullanıcı ID (opsiyonel)</label>
                                    <input id="balance-user-id" type="number" class="form-control form-control-sm" placeholder="Örn: 5" />
                                </div>
                                <div class="col-12 col-md-3">
                                    <label class="form-label small mb-1">Yıl</label>
                                    <input id="balance-year-filter" type="number" class="form-control form-control-sm" />
                                </div>
                                <div class="col-12 col-md-3">
                                    <button id="balance-filter-btn" class="btn btn-sm btn-primary w-100" type="button">
                                        <i class="fas fa-search me-1"></i>Bakiyeleri Sorgula
                                    </button>
                                </div>
                                <div class="col-12 col-md-3">
                                    <button id="balance-clear-btn" class="btn btn-sm btn-outline-secondary w-100" type="button">
                                        <i class="fas fa-eraser me-1"></i>Temizle
                                    </button>
                                </div>
                            </div>
                            <div class="small text-muted mt-2">Toplam izin gününü tablo üzerinden düzenleyebilirsiniz.</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="balances-table-container" class="mb-4"></div>
            <div id="pending-hr-approvals-table-container" class="mb-4"></div>
            <div id="hr-decisions-table-container"></div>
        </div>
    </section>

    <div id="hr-vacation-detail-modal-container"></div>
    <div id="hr-vacation-approve-modal-container"></div>

    <div class="modal fade" id="hrRejectVacationModal" tabindex="-1" aria-labelledby="hrRejectVacationModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="hrRejectVacationModalLabel">
                        <i class="fas fa-times-circle me-2"></i>İzin Talebini Reddet
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label for="hr-reject-comment" class="form-label">Yorum (opsiyonel)</label>
                    <textarea id="hr-reject-comment" class="form-control" rows="4" maxlength="500"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button type="button" class="btn btn-danger" id="hr-confirm-reject-btn">
                        <i class="fas fa-times me-1"></i>Reddet
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="vacation.js"></script>
</body>
</html>
