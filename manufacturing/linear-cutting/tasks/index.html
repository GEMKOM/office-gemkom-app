<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Lineer Kesim Görevler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../../style.css">
    <link rel="stylesheet" href="../../../components/navbar.css">
    <link rel="stylesheet" href="../../../components/header/header.css">
    <link rel="stylesheet" href="../../../components/filters/filters.css">
    <link rel="stylesheet" href="../../../components/display-modal/display-modal.css">
    <link rel="stylesheet" href="../../../components/table/table.css">
    <link rel="stylesheet" href="../../../components/badges/badges.css">
    <link rel="stylesheet" href="../../../components/edit-modal/edit-modal.css">
    <link rel="stylesheet" href="../../../components/confirmation-modal/confirmation-modal.css">
    <link rel="stylesheet" href="../../../components/notification/notification.css">
    <link rel="icon" type="image/png" href="../../../images/gemkom.png">
</head>
<body>
    <div id="navbar-container"></div>

    <section class="modules-section py-5">
        <div class="container-fluid">
            <div id="header-placeholder"></div>
            <div id="filters-placeholder"></div>

            <div class="row">
                <div class="col-12">
                    <div id="tasks-table-container"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="task-details-modal-container"></div>
    <div id="task-edit-modal-container"></div>
    <div id="task-complete-confirm-modal-container"></div>
    <div class="lc-tooltip" id="lc-task-tooltip"></div>

    <style>
        .lc-canvas-wrap {
            background: #fff;
            border: 1px solid rgba(0,0,0,.08);
            border-radius: 10px;
            padding: 14px;
        }
        .lc-canvas-wrap canvas { width: 100%; display: block; }
        .lc-bar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .lc-bar-title { font-weight:600; font-size:.9rem; }
        .lc-bar-meta { font-size:.8rem; color:#6c757d; }
        .lc-tooltip {
            position: fixed; z-index: 9000; pointer-events: none; display: none;
            background: rgba(20,20,30,.9); color: #fff;
            padding: 9px 12px; border-radius: 8px; font-size: .8rem;
            max-width: 260px; line-height: 1.5;
            box-shadow: 0 4px 16px rgba(0,0,0,.25);
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../components/header/header.js"></script>
    <script type="module" src="tasks.js"></script>
</body>
</html>
