<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Kaynak Kapasite Planlama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../../style.css">
    <link rel="stylesheet" href="../../../components/navbar.css">
    <link rel="stylesheet" href="../../../components/header/header.css">
    <link rel="stylesheet" href="../../../components/table/table.css">
    <link rel="stylesheet" href="../../../components/gantt/gantt.css">
    <link rel="stylesheet" href="../../../components/dropdown/dropdown.css">
    <link rel="stylesheet" href="../../../components/edit-modal/edit-modal.css">
    <link rel="stylesheet" href="../../../components/confirmation-modal/confirmation-modal.css">
    <link rel="stylesheet" href="../../../components/notification/notification.css">
    <link rel="icon" type="image/png" href="../../../images/gemkom.png">
    <style>
        .welding-jobs-list { max-height: 70vh; overflow-y: auto; }
        .welding-job-card {
            border: 1px solid #e5e7eb;
            border-left: 3px solid #8b0000;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 8px;
            cursor: grab;
            background: #fff;
            transition: box-shadow .15s ease, transform .05s ease;
        }
        .welding-job-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .welding-job-card:active { cursor: grabbing; }
        .welding-job-card.dragging { opacity: .5; }
        .welding-job-card.no-weight {
            cursor: not-allowed;
            opacity: .6;
            border-left-color: #9ca3af;
            background: #f9fafb;
        }
        .welding-job-card.no-weight:hover { box-shadow: none; }
        .welding-job-card .job-no { font-weight: 700; color: #1f2937; font-size: .85rem; }
        .welding-job-card .job-title { color: #374151; font-size: .8rem; }
        .welding-job-card .job-meta { color: #6b7280; font-size: .72rem; margin-top: 2px; }
        .welding-job-card .job-alloc.over { color: #b91c1c; font-weight: 600; }
        #gantt-container.drop-active {
            outline: 2px dashed #8b0000;
            outline-offset: -4px;
            background: rgba(139,0,0,.03);
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <section class="modules-section py-5">
        <div class="container-fluid">
            <div id="header-placeholder"></div>

            <div class="row">
                <div class="col-lg-8 mb-3" id="gantt-col">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h5 class="card-title">
                                <i class="fas fa-chart-gantt me-2 text-primary"></i>
                                Kapasite Planı
                            </h5>
                            <div class="card-actions">
                                <button class="btn btn-sm btn-outline-secondary" id="toggle-jobs-btn"
                                        title="Kaynak İşleri panelini gizle/göster">
                                    <i class="fas fa-table-columns me-1"></i>İşleri Gizle
                                </button>
                                <button class="btn btn-sm btn-success" id="save-btn" disabled>
                                    <i class="fas fa-save me-1"></i>Kaydet
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="warnings-banner" class="alert alert-warning d-none" role="alert"></div>
                            <div id="gantt-container"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 mb-3" id="jobs-col">
                    <div class="dashboard-card h-100">
                        <div class="card-header">
                            <h5 class="card-title">
                                <i class="fas fa-list me-2 text-primary"></i>
                                Kaynak İşleri
                            </h5>
                            <small class="text-muted">Bir işi sürükleyip Gantt'a bırakın</small>
                        </div>
                        <div class="card-body">
                            <input type="text" id="jobs-search" class="form-control form-control-sm mb-2"
                                   placeholder="İş no, başlık veya müşteri ara...">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="show-completed-toggle">
                                <label class="form-check-label small text-muted" for="show-completed-toggle">
                                    Tamamlanan işleri göster
                                </label>
                            </div>
                            <div id="jobs-table-container" class="welding-jobs-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="allocation-modal-container"></div>
    <div id="promote-modal-container"></div>
    <div id="delete-confirm-modal-container"></div>

    <footer class="footer-section">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>GEMKOM</h5>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-light mb-0">&copy; 2024 GEMKOM. Tüm hakları saklıdır.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="planning.js"></script>
</body>
</html>
