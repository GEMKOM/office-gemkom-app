<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Üretim Planlama</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../components/navbar.css">
    <link rel="stylesheet" href="../../components/header/header.css">
    <link rel="stylesheet" href="../../components/table/table.css">
    <link rel="stylesheet" href="../../components/badges/badges.css">
    <link rel="stylesheet" href="../../components/gantt/gantt.css">
    <link rel="stylesheet" href="../../components/dropdown/dropdown.css">
    <link rel="icon" type="image/png" href="../../images/gemkom.png">
    <link rel="stylesheet" href="production-planning.css">
</head>
<body class="pre-auth">
    <!-- Navigation -->
    <div id="navbar-container"></div>

    <!-- Main Content Section -->
    <section class="modules-section py-5">
        <div class="container-fluid">
            <!-- Header Component Placeholder -->
            <div id="header-placeholder"></div>

            <!-- Toolbar: job order picker + view toggle + filters, one row -->
            <div id="job-order-picker-container" class="mb-3" style="display: none;">
                <div class="dashboard-card">
                    <div class="card-body py-2">
                        <div class="pp-toolbar d-flex flex-wrap align-items-center">
                            <button type="button" id="pp-back-portfolio" class="btn btn-outline-primary btn-sm" style="display: none;">
                                <i class="fas fa-arrow-left me-1"></i>Tüm Projeler
                            </button>
                            <div id="pp-portfolio-controls" class="d-none flex-wrap align-items-center pp-toolbar">
                                <label class="pp-toolbar-label mb-0"><i class="fas fa-layer-group me-1"></i>Durum</label>
                                <div id="pp-portfolio-status" class="pp-filter"></div>
                                <label class="pp-toolbar-label mb-0"><i class="fas fa-sort me-1"></i>Sırala</label>
                                <div id="pp-portfolio-sort" class="pp-filter"></div>
                                <div class="vr mx-1 d-none d-md-block"></div>
                            </div>
                            <label class="pp-toolbar-label mb-0"><i class="fas fa-briefcase me-1"></i>İş Emri</label>
                            <div id="job-order-picker"></div>
                            <button type="button" id="apply-job-orders" class="btn btn-primary btn-sm">
                                <i class="fas fa-eye me-1"></i>Görüntüle
                            </button>
                            <div id="pp-view-controls" class="d-none flex-wrap align-items-center pp-toolbar">
                                <div class="vr mx-1 d-none d-md-block"></div>
                                <div class="btn-group btn-group-sm" role="group" aria-label="Görünüm seçimi">
                                    <button type="button" class="btn btn-outline-primary" data-plan-view="table">
                                        <i class="fas fa-table me-1"></i>Tablo
                                    </button>
                                    <button type="button" class="btn btn-outline-primary" data-plan-view="gantt">
                                        <i class="fas fa-chart-gantt me-1"></i>Gantt
                                    </button>
                                </div>
                                <div id="pp-filter-department" class="pp-filter"></div>
                                <div id="pp-filter-classification" class="pp-filter"></div>
                                <button type="button" id="pp-filter-clear" class="btn btn-sm btn-outline-secondary" style="display: none;">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <span class="ms-auto text-muted small d-none d-xl-inline">
                                Sapma değerleri iş günü cinsindendir (hafta sonu ve resmi tatiller sayılmaz).
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Job order finish verdicts (hero panel) -->
            <div id="plan-verdict-container"></div>

            <!-- Table / Gantt -->
            <div class="row">
                <div class="col-12">
                    <div id="plan-view-container"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJS for Excel export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Header Component -->
    <script src="../../components/header/header.js"></script>
    <script type="module" src="production-planning.js"></script>
</body>
</html>
