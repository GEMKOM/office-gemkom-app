<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Üretim Planlama</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../components/navbar.css">
    <link rel="stylesheet" href="../../components/header/header.css">
    <link rel="stylesheet" href="../../components/table/table.css">
    <link rel="stylesheet" href="../../components/badges/badges.css">
    <link rel="stylesheet" href="../../components/statistics-cards/statistics-cards.css">
    <link rel="stylesheet" href="../../components/gantt/gantt.css">
    <link rel="stylesheet" href="../../components/dropdown/dropdown.css">
    <link rel="icon" type="image/png" href="../../images/gemkom.png">
    <link rel="stylesheet" href="production-planning.css">
</head>
<body class="pre-auth">
    <!-- Navigation -->
    <div id="navbar-container"></div>

    <!-- Main Content Section -->
    <section class="modules-section py-5">
        <div class="container-fluid">
            <!-- Header Component Placeholder -->
            <div id="header-placeholder"></div>

            <!-- Job Order Picker (multi-select) -->
            <div id="job-order-picker-container" class="mb-3" style="display: none;">
                <div class="dashboard-card">
                    <div class="card-body py-3">
                        <label class="form-label fw-semibold mb-2">
                            <i class="fas fa-briefcase me-1"></i>İş Emirleri
                        </label>
                        <div class="d-flex flex-wrap gap-2 align-items-center">
                            <div id="job-order-picker" class="flex-grow-1" style="min-width: 280px; max-width: 560px;"></div>
                            <button type="button" id="apply-job-orders" class="btn btn-primary">
                                <i class="fas fa-eye me-1"></i>Görüntüle
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Statistics Cards -->
            <div class="row mb-4">
                <div class="col-12">
                    <div id="plan-statistics-container"></div>
                </div>
            </div>

            <!-- Table / Gantt -->
            <div class="row">
                <div class="col-12">
                    <div id="plan-view-container"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJS for Excel export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Header Component -->
    <script src="../../components/header/header.js"></script>
    <script type="module" src="production-planning.js"></script>
</body>
</html>
