<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Finans - Satın Alma Siparişleri</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../components/navbar.css">
    <link rel="stylesheet" href="../../components/dropdown/dropdown.css">
    <link rel="stylesheet" href="../finance-badges.css">
    <link rel="stylesheet" href="../../components/badges/badges.css">
    <link rel="icon" type="image/png" href="../../images/gemkom.png">
    <link rel="stylesheet" href="../../pre-auth.css">
    <link rel="stylesheet" href="purchase-orders.css">
    <link rel="stylesheet" href="../../components/header/header.css">
    <link rel="stylesheet" href="../../components/statistics-cards/statistics-cards.css">
    <link rel="stylesheet" href="../../components/filters/filters.css">
    <link rel="stylesheet" href="../../components/table/table.css">
    <link rel="stylesheet" href="../../components/confirmation-modal/confirmation-modal.css">
    <link rel="stylesheet" href="../../components/edit-modal/edit-modal.css">
    <link rel="stylesheet" href="../../components/display-modal/display-modal.css">
</head>
<body class="pre-auth">
    <!-- Navigation -->
    <div id="navbar-container"></div>

    <!-- Main Content Section -->
    <section class="modules-section py-5">
        <div class="container-fluid">
            <!-- Header Component Placeholder -->
            <div id="header-placeholder"></div>

            <div id="finance-tab-pane-po">
                <!-- Statistics Cards -->
                <div id="purchase-orders-statistics"></div>

                <!-- Filters Section -->
                <div id="filters-placeholder"></div>

                <div id="finance-view-switcher-anchor-po">
                    <div class="dashboard-card mb-3" id="finance-po-view-switcher-card">
                        <div class="card-body py-2">
                            <div class="d-flex flex-wrap gap-2 align-items-center">
                                <div class="btn-group btn-group-sm" role="group" aria-label="Görünüm seçimi" id="finance-po-main-tabs">
                                    <button type="button" class="btn btn-outline-primary" data-finance-tab="po" id="tab-po-trigger">
                                        <i class="fas fa-shopping-cart me-1"></i>Satın Alma Siparişleri
                                    </button>
                                    <button type="button" class="btn btn-outline-primary" data-finance-tab="dbs" id="tab-dbs-trigger">
                                        <i class="fas fa-university me-1"></i>DBS Tedarikçileri
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Purchase Orders Table Section -->
                <div class="row">
                    <div class="col-12">
                        <div id="purchase-orders-table-container"></div>
                    </div>
                </div>
            </div>

            <div id="finance-tab-pane-dbs" class="d-none">
                <div id="finance-view-switcher-anchor-dbs"></div>
                <div class="row">
                    <div class="col-12">
                        <div id="dbs-suppliers-table-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>



    <div id="purchase-order-details-modal-container"></div>
    <div id="mark-paid-modal-container"></div>
    <div id="dbs-pay-modal-container"></div>
    <div id="dbs-payments-display-modal-container"></div>

    <!-- Footer -->
    <footer class="footer-section">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>GEMKOM</h5>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-light mb-0">&copy; 2024 GEMKOM. Tüm hakları saklıdır.</p>
                </div>
            </div>
        </div>
    </footer>
    <div id="action-confirm-modal-container"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="purchase-orders.js"></script>
</body>
</html>
