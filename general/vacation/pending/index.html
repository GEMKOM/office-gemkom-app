<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Bekleyen İzin Onayları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../../style.css">
    <link rel="stylesheet" href="../../../components/navbar.css">
    <link rel="stylesheet" href="../../../components/header/header.css">
    <link rel="stylesheet" href="../../../components/table/table.css">
    <link rel="stylesheet" href="../../../components/badges/badges.css">
    <link rel="stylesheet" href="../../../components/display-modal/display-modal.css">
    <link rel="stylesheet" href="../../../components/confirmation-modal/confirmation-modal.css">
    <link rel="icon" type="image/png" href="../../../images/gemkom.png">
</head>
<body>
    <div id="navbar-container"></div>

    <section class="modules-section py-5">
        <div class="container-fluid">
            <div id="header-placeholder"></div>
            <div id="pending-table-container" class="mb-4"></div>
            <div id="decisions-table-container"></div>
        </div>
    </section>

    <div id="vacation-approval-detail-modal-container"></div>
    <div id="vacation-approve-modal-container"></div>

    <div class="modal fade" id="rejectVacationModal" tabindex="-1" aria-labelledby="rejectVacationModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="rejectVacationModalLabel">
                        <i class="fas fa-times-circle me-2"></i>İzin Talebini Reddet
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label for="reject-comment" class="form-label">Yorum (opsiyonel)</label>
                    <textarea id="reject-comment" class="form-control" rows="4" maxlength="500" placeholder="Reddetme sebebi..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button type="button" class="btn btn-danger" id="confirm-reject-btn">
                        <i class="fas fa-times me-1"></i>Reddet
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="pending.js"></script>
</body>
</html>
