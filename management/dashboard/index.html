<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Yönetim Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../components/navbar.css">
    <link rel="stylesheet" href="../../components/header/header.css">
    <link rel="stylesheet" href="../../components/statistics-cards/statistics-cards.css">
    <link rel="stylesheet" href="../../pre-auth.css">
    <link rel="stylesheet" href="./dashboard.css">
    <link rel="icon" type="image/png" href="../../images/gemkom.png">
</head>
<body class="pre-auth">
    <div id="navbar-container"></div>

    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>

    <section class="modules-section py-5">
        <div class="container-fluid">
            <div id="header-placeholder"></div>

            <div class="overview-toolbar mb-3">
                <div class="overview-toolbar__left">
                    <div class="btn-group overview-preset-group" role="group" aria-label="Tarih aralığı">
                        <button type="button" class="btn btn-sm btn-outline-secondary preset-btn" data-preset="current_month">Bu Ay</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary preset-btn" data-preset="last_3_months">Son 3 Ay</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary preset-btn" data-preset="last_6_months">Son 6 Ay</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary preset-btn" data-preset="last_year">Son 1 Yıl</button>
                    </div>
                </div>

                <div class="overview-toolbar__right">
                    <div class="overview-custom-range">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                            <input id="date-from" type="date" class="form-control" placeholder="YYYY-MM-DD" />
                            <span class="input-group-text">→</span>
                            <input id="date-to" type="date" class="form-control" placeholder="YYYY-MM-DD" />
                            <button id="apply-custom-range" class="btn btn-sm btn-primary" type="button">
                                <i class="fas fa-filter me-1"></i>Uygula
                            </button>
                        </div>
                    </div>

                    <button id="refresh-overview" class="btn btn-sm btn-outline-primary">
                        <i class="fas fa-sync-alt me-1"></i>Yenile
                    </button>
                </div>
            </div>

            <div class="overview-meta mb-3">
                <div id="range-label" class="text-muted small"></div>
            </div>

            <div id="overview-loading" class="overview-state" style="display:none;">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <div class="mt-2 text-muted">Dashboard yükleniyor...</div>
                </div>
            </div>

            <div id="overview-error" class="overview-state" style="display:none;"></div>

            <div id="overview-content">
                <div class="row g-3">
                    <div class="col-lg-4">
                        <div id="panel-job-orders"></div>
                    </div>
                    <div class="col-lg-4">
                        <div id="panel-sales"></div>
                    </div>
                    <div class="col-lg-4">
                        <div id="panel-costs"></div>
                    </div>
                </div>

                <div class="row g-3 mt-0">
                    <div class="col-lg-6">
                        <div id="panel-manufacturing"></div>
                    </div>
                    <div class="col-lg-6">
                        <div id="panel-quality"></div>
                    </div>
                </div>

                <div class="row g-3 mt-0">
                    <div class="col-lg-6">
                        <div id="panel-subcontracting"></div>
                    </div>
                    <div class="col-lg-6">
                        <div id="panel-procurement"></div>
                    </div>
                </div>

                <div class="row g-3 mt-0">
                    <div class="col-lg-6">
                        <div id="panel-design-revisions"></div>
                    </div>
                    <div class="col-lg-6">
                        <div id="panel-overtime"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer-section">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>GEMKOM</h5>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-light mb-0">&copy; 2024 GEMKOM. Tüm hakları saklıdır.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./dashboard.js"></script>
</body>
</html>
