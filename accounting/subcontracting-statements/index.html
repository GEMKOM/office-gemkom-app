<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMKOM - Muhasebe / Hakedişler</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../components/navbar.css">
    <link rel="stylesheet" href="../../components/header/header.css">
    <link rel="stylesheet" href="../../components/table/table.css">
    <link rel="icon" type="image/png" href="../../images/gemkom.png">
</head>
<body>
    <!-- Navigation -->
    <div id="navbar-container"></div>

    <!-- Main Content Section -->
    <section class="modules-section py-5">
        <div class="container-fluid">
            <div id="header-placeholder"></div>

            <div class="row mb-3">
                <div class="col-12">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h5 class="card-title">
                                <i class="fas fa-filter me-2 text-primary"></i>
                                Parametreler
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3 align-items-end">
                                <div class="col-12 col-md-3">
                                    <label class="form-label">Yıl</label>
                                    <input id="year-input" type="number" class="form-control" min="2000" max="2100" step="1">
                                </div>
                                <div class="col-12 col-md-3">
                                    <label class="form-label">Ay</label>
                                    <select id="month-input" class="form-select"></select>
                                </div>
                                <div class="col-12 col-md-6 d-flex gap-2">
                                    <button id="load-btn" class="btn btn-primary">
                                        <i class="fas fa-sync-alt me-1"></i>Yükle
                                    </button>
                                    <button id="download-btn" class="btn btn-outline-secondary">
                                        <i class="fas fa-download me-1"></i>Dosya Olarak İndir
                                    </button>
                                    <div class="ms-auto text-muted small d-flex align-items-center">
                                        <span id="status-text"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div id="accounting-export-table-container"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-section">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>GEMKOM</h5>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-light mb-0">&copy; 2024 GEMKOM. Tüm hakları saklıdır.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../components/header/header.js"></script>
    <script src="../../components/table/table.js"></script>
    <script type="module" src="subcontracting-statements.js"></script>
</body>
</html>
